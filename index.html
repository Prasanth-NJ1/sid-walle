<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <title>SID — Companion Robot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="tap-unlock">
    <div class="tap-content">
      <div class="tap-eye-icon">👁</div>
      <div class="tap-title">SID</div>
      <div class="tap-sub">TAP TO ACTIVATE</div>
    </div>
  </div>
  <video id="face-video" style="display:none;position:absolute;width:1px;height:1px;" playsinline webkit-playsinline muted autoplay></video>
  <canvas id="face-canvas" style="display:none;position:absolute;width:1px;height:1px;"></canvas>
  <button class="corner-btn" id="fullscreen-btn" title="Fullscreen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
  </button>
  <button class="corner-btn" id="menu-btn" title="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div id="mic-indicator">
    <div class="mic-bar"></div><div class="mic-bar"></div><div class="mic-bar"></div>
    <div class="mic-bar"></div><div class="mic-bar"></div><div class="mic-bar"></div>
    <div class="mic-bar"></div>
  </div>
  <div id="reaction-label">STANDBY</div>
  <div id="face-indicator">● NO FACE</div>
  <!-- capture-btn removed — auto 5s countdown handles capture
  <button id="capture-btn" title="Capture and Analyse">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    <span>ANALYSE</span>
  </button>
  -->
  <div id="main-screen">
    <svg id="eyes-svg" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0">
      <defs>
        <filter id="eye-glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
          <feColorMatrix in="blur" type="matrix"
            values="0 0 0 0 0  0 0.7 1 0 0  0 0.9 1 0 0  0 0 0 0.35 0" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <radialGradient id="glow-l" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(0,180,255,0.08)"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <radialGradient id="glow-r" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(0,180,255,0.08)"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
      </defs>

      <ellipse id="amb-l" fill="url(#glow-l)"/>
      <ellipse id="amb-r" fill="url(#glow-r)"/>

      <g id="eyes-group" filter="url(#eye-glow)">
        <!-- LEFT EYE -->
        <g id="left-eye-group">
          <circle id="l-sclera" fill="#0d1117"/>
          <circle id="l-iris" fill="#00ccff"/>
          <circle id="l-iris-inner" fill="#0088bb" opacity="0.6"/>
          <circle id="l-pupil" fill="#050810"/>
          <circle id="l-highlight1" fill="rgba(255,255,255,0.9)"/>
          <circle id="l-highlight2" fill="rgba(255,255,255,0.5)"/>
          <rect   id="l-lid-top" fill="#080c14"/>
          <rect   id="l-lid-bot" fill="#080c14"/>
          <circle id="l-border" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="2"/>
        </g>
        <rect id="l-brow" fill="#c8e0ff" rx="5"/>

        <!-- RIGHT EYE -->
        <g id="right-eye-group">
          <circle id="r-sclera" fill="#0d1117"/>
          <circle id="r-iris" fill="#00ccff"/>
          <circle id="r-iris-inner" fill="#0088bb" opacity="0.6"/>
          <circle id="r-pupil" fill="#050810"/>
          <circle id="r-highlight1" fill="rgba(255,255,255,0.9)"/>
          <circle id="r-highlight2" fill="rgba(255,255,255,0.5)"/>
          <rect   id="r-lid-top" fill="#080c14"/>
          <rect   id="r-lid-bot" fill="#080c14"/>
          <circle id="r-border" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="2"/>
        </g>
        <rect id="r-brow" fill="#c8e0ff" rx="5"/>

        <circle id="nose-dot" fill="rgba(0,200,255,0.18)"/>
      </g>
    </svg>
  </div>
  <!-- Speech bubble toggle — small pill button bottom-right -->
  <button id="bubble-toggle" title="Toggle response box">💬</button>
  <div id="speech-bubble"></div>
  <div id="location-toast"></div>
  <div id="camera-overlay">
    <video id="cam-preview" autoplay playsinline muted webkit-playsinline></video>
    <div id="cam-overlay-label">📷 VISION MODE ACTIVE</div>
    <button id="cam-close">✕</button>
  </div>
  <div id="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <div id="status-text">> INITIALISING...</div>
  </div>
  <div id="menu-overlay"></div>
  <div id="menu-panel">
    <div class="menu-header">
      <span>SID SETTINGS</span>
      <div class="menu-close" id="menu-close">✕</div>
    </div>
    <div class="menu-section">
      <div class="menu-section-title">🌐 LLM Server (Ollama / ngrok)</div>
      <!-- LLM URL text input disabled -->
      <div class="wifi-input-row">
        <input type="text" id="llm-url-input" class="wifi-input" placeholder="https://xxxx.ngrok-free.app">
      </div>
     
      <button class="btn-primary" id="save-llm-btn" style="width:100%;margin-top:6px;">SAVE &amp; TEST</button>
      <div id="llm-status" style="font-size:10px;color:var(--text-dim);margin-top:6px;min-height:14px;"></div>
    </div>
    <div class="menu-section">
      <div class="menu-section-title">🤖 Robot (ROS / FastAPI)</div>
      <div class="wifi-input-row">
        <input type="text" id="rpi-ip" class="wifi-input" placeholder="192.168.x.x">
        <input type="text" id="rpi-port" class="wifi-input" placeholder="8080" style="width:70px;flex:none;">
      </div>
      <button class="btn-primary" id="rpi-connect-btn" style="width:100%;margin-top:6px;">CONNECT</button>
      <div id="rpi-status">Not connected</div>
    </div>
    <div class="menu-section">
      <div class="menu-section-title">Eye Colour</div>
      <div class="color-grid" id="color-grid"></div>
    </div>
    <div class="menu-section">
      <div class="menu-section-title">Mood Override</div>
      <div class="mood-grid" id="mood-grid"></div>
    </div>
    <div class="menu-section">
      <div class="menu-section-title">Audio Settings</div>
      <div class="slider-row">
        <span class="slider-label">Volume</span>
        <input type="range" id="vol-slider" min="0" max="100" value="80" step="1">
        <span class="slider-val" id="vol-val">80</span>
      </div>
      <div class="toggle-row"><span>Always-on Mic</span><div class="toggle on" id="mic-toggle"></div></div>
      <div class="toggle-row"><span>Camera Active</span><div class="toggle on" id="cam-toggle"></div></div>
    </div>
    <div class="menu-section">
      <div class="menu-section-title">Eye Behaviour</div>
      <div class="slider-row">
        <span class="slider-label">Blink Rate</span>
        <input type="range" id="blink-slider" min="1" max="10" value="4" step="1">
        <span class="slider-val" id="blink-val">4</span>
      </div>
      <div class="toggle-row"><span>Random Motion</span><div class="toggle on" id="motion-toggle"></div></div>
      <div class="toggle-row"><span>Follow Touch</span><div class="toggle on" id="touch-toggle"></div></div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
